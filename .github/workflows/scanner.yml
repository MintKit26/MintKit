name: MintKit Trend Scanner

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tweepy anthropic python-dotenv schedule solana solders anchorpy

      - name: Initialize database tables
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('mintkit.db')
          cur = conn.cursor()
          cur.execute('''CREATE TABLE IF NOT EXISTS meme_trends (id TEXT PRIMARY KEY, source TEXT, title TEXT, description TEXT, url TEXT, image_url TEXT, raw_score REAL, velocity_score REAL, novelty_score REAL, longevity_score REAL, viability_score REAL, discovered_at TEXT, used_for_coin INTEGER DEFAULT 0, created_at TEXT DEFAULT (datetime(\"now\")))''')
          cur.execute('''CREATE TABLE IF NOT EXISTS scan_runs (id INTEGER PRIMARY KEY AUTOINCREMENT, run_at TEXT DEFAULT (datetime(\"now\")), trends_found INTEGER, top_candidates TEXT, status TEXT)''')
          cur.execute('''CREATE TABLE IF NOT EXISTS coin_concepts (id TEXT PRIMARY KEY, trend_title TEXT, coin_name TEXT, ticker TEXT, tagline TEXT, backstory TEXT, image_prompt TEXT, viability_score REAL, created_at TEXT, approved INTEGER DEFAULT 0)''')
          conn.commit()
          conn.close()
          print('Tables created!')
          "

      - name: Run trend scanner
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NETWORK: ${{ secrets.NETWORK }}
        run: |
          python mintkit.py scan

      - name: Run concept generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NETWORK: ${{ secrets.NETWORK }}
        run: |
          python mintkit.py generate
