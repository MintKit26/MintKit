name: MintKit Buyback Engine

on:
  schedule:
    - cron: '0 0 * * *'  # runs daily at midnight UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  buyback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install solana solders python-dotenv

      - name: Download latest database
        uses: actions/download-artifact@v4
        with:
          name: mintkit-db
        continue-on-error: true

      - name: Run buyback engine
        env:
          WALLET_PATH: ${{ secrets.WALLET_PATH }}
        run: |
          python mintkit.py buyback

      - name: Run transparency sync
        run: |
          python mintkit.py report

      - name: Upload updated database
        uses: actions/upload-artifact@v4
        with:
          name: mintkit-db
          path: mintkit.db
          retention-days: 7
