<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MintKit Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 14px; }
    :root {
      --bg: #ffffff;
      --bg2: #f5f5f0;
      --bg3: #eeede8;
      --border: rgba(0,0,0,0.1);
      --text: #1a1a1a;
      --text2: #666;
      --text3: #999;
      --blue: #185fa5;
      --blue-bg: #e6f1fb;
      --green: #3b6d11;
      --green-bg: #eaf3de;
      --amber: #854f0b;
      --amber-bg: #faeeda;
      --red: #a32d2d;
      --red-bg: #fcebeb;
      --radius: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #e8e8e0; }
      :root {
        --bg: #242424;
        --bg2: #1a1a1a;
        --bg3: #2e2e2e;
        --border: rgba(255,255,255,0.1);
        --text: #e8e8e0;
        --text2: #aaa;
        --text3: #666;
        --blue: #85b7eb;
        --blue-bg: #042c53;
        --green: #97c459;
        --green-bg: #173404;
        --amber: #ef9f27;
        --amber-bg: #412402;
        --red: #f09595;
        --red-bg: #501313;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const API = '';

    function useApi(endpoint, deps=[]) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const fetch_ = useCallback(async () => {
        setLoading(true);
        try {
          const token = localStorage.getItem('mk_token');
          const res = await fetch(API + endpoint, {
            headers: token ? { Authorization: `Bearer ${token}` } : {}
          });
          const json = await res.json();
          setData(json);
        } catch(e) {}
        setLoading(false);
      }, deps);
      useEffect(() => { fetch_(); }, [fetch_]);
      return { data, loading, refetch: fetch_ };
    }

    async function callAction(endpoint, token, body={}) {
      const res = await fetch(API + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      return res.json();
    }

    const s = {
      nav: { display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 24px', background:'var(--bg)', borderBottom:'0.5px solid var(--border)', position:'sticky', top:0, zIndex:10 },
      brand: { fontWeight:500, fontSize:16, color:'var(--text)', display:'flex', alignItems:'center', gap:8 },
      badge: (c) => ({ fontSize:11, padding:'2px 8px', borderRadius:99, background:`var(--${c}-bg)`, color:`var(--${c})` }),
      tabs: { display:'flex', gap:4 },
      tab: (active) => ({ fontSize:13, padding:'5px 12px', borderRadius:'var(--radius)', cursor:'pointer', border:'none', background: active ? 'var(--bg3)' : 'transparent', color: active ? 'var(--text)' : 'var(--text2)', fontFamily:'inherit' }),
      main: { maxWidth:1100, margin:'0 auto', padding:'20px 16px' },
      metrics: { display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(150px, 1fr))', gap:10, marginBottom:20 },
      metric: { background:'var(--bg3)', borderRadius:'var(--radius)', padding:12 },
      metricLabel: { fontSize:11, color:'var(--text2)', marginBottom:4 },
      metricValue: { fontSize:24, fontWeight:500, color:'var(--text)' },
      metricSub: { fontSize:11, color:'var(--text3)', marginTop:2 },
      grid: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:16 },
      card: { background:'var(--bg)', border:'0.5px solid var(--border)', borderRadius:'var(--radius-lg)', padding:16 },
      cardTitle: { fontSize:11, fontWeight:500, color:'var(--text2)', marginBottom:12, textTransform:'uppercase', letterSpacing:'0.05em' },
      row: { display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 0', borderBottom:'0.5px solid var(--border)' },
      rowLast: { display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 0' },
      btn: (c='blue') => ({ fontSize:13, padding:'7px 14px', borderRadius:'var(--radius)', border:`0.5px solid var(--${c})`, background:`var(--${c}-bg)`, color:`var(--${c})`, cursor:'pointer', fontFamily:'inherit', transition:'opacity 0.1s' }),
      btnGhost: { fontSize:13, padding:'7px 14px', borderRadius:'var(--radius)', border:'0.5px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontFamily:'inherit' },
      actions: { display:'flex', gap:8, flexWrap:'wrap', marginBottom:16 },
      input: { width:'100%', padding:'8px 12px', borderRadius:'var(--radius)', border:'0.5px solid var(--border)', background:'var(--bg)', color:'var(--text)', fontSize:14, fontFamily:'inherit', outline:'none' },
      pipeline: { display:'flex', marginBottom:16 },
      step: (state) => ({
        flex:1, textAlign:'center', padding:'8px 4px', fontSize:11,
        border:'0.5px solid var(--border)',
        background: state==='done' ? 'var(--green-bg)' : state==='active' ? 'var(--blue-bg)' : 'var(--bg)',
        color: state==='done' ? 'var(--green)' : state==='active' ? 'var(--blue)' : 'var(--text3)',
      }),
    };

    function Badge({ color, children }) {
      return <span style={s.badge(color)}>{children}</span>;
    }

    function LoginModal({ onLogin }) {
      const [pw, setPw] = useState('');
      const [err, setErr] = useState('');
      const submit = async () => {
        const res = await fetch(API + '/api/auth/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ password: pw })
        });
        const data = await res.json();
        if (data.token) { onLogin(data.token); }
        else { setErr('Incorrect password'); }
      };
      return (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:100 }}>
          <div style={{ background:'var(--bg)', borderRadius:'var(--radius-lg)', padding:32, width:320, border:'0.5px solid var(--border)' }}>
            <div style={{ fontWeight:500, fontSize:16, marginBottom:16 }}>Admin access</div>
            <input style={{...s.input, marginBottom:8}} type="password" placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} />
            {err && <div style={{ color:'var(--red)', fontSize:12, marginBottom:8 }}>{err}</div>}
            <button style={{...s.btn(), width:'100%'}} onClick={submit}>Unlock</button>
          </div>
        </div>
      );
    }

    function Dashboard() {
      const [tab, setTab] = useState('dashboard');
      const [token, setToken] = useState(() => localStorage.getItem('mk_token'));
      const [showLogin, setShowLogin] = useState(false);
      const [actionMsg, setActionMsg] = useState('');

      const { data: status, refetch: refetchStatus } = useApi('/api/status');
      const { data: coins } = useApi('/api/coins');
      const { data: trends } = useApi('/api/trends');
      const { data: concepts } = useApi('/api/concepts');
      const { data: activity } = useApi('/api/activity');
      const { data: buybacks } = useApi('/api/buybacks');

      const handleLogin = (t) => { localStorage.setItem('mk_token', t); setToken(t); setShowLogin(false); };
      const logout = () => { localStorage.removeItem('mk_token'); setToken(null); };

      const runAction = async (endpoint, label) => {
        if (!token) { setShowLogin(true); return; }
        setActionMsg(`Running ${label}...`);
        try {
          const res = await callAction(endpoint, token);
          setActionMsg(res.message || (res.success ? 'Done!' : 'Failed'));
          refetchStatus();
        } catch(e) { setActionMsg('Error — check server logs'); }
        setTimeout(() => setActionMsg(''), 4000);
      };

      const st = status || {};
      const coinList = coins?.coins || [];
      const trendList = trends?.trends || [];
      const conceptList = concepts?.concepts || [];
      const activityList = activity?.events || [];
      const buybackList = buybacks?.buybacks || [];

      const pipelineSteps = [
        { label:'Scan', done: st.trends_scanned > 0 },
        { label:'Generate', done: st.concepts_generated > 0 },
        { label:'Approve', done: st.concepts_approved > 0 },
        { label:'Deploy', done: st.tokens_deployed > 0 },
        { label:'Promote', done: st.promotions_posted > 0 },
        { label:'Buyback', done: st.buybacks_executed > 0 },
      ];

      const firstPending = pipelineSteps.findIndex(s => !s.done);

      return (
        <div>
          {showLogin && <LoginModal onLogin={handleLogin} />}

          <nav style={s.nav}>
            <div style={s.brand}>
              <span>MintKit</span>
              <span style={s.badge('blue')}>v1.0</span>
              <span style={s.badge('amber')}>devnet</span>
            </div>
            <div style={s.tabs}>
              {['dashboard','coins','trends','treasury','logs'].map(t => (
                <button key={t} style={s.tab(tab===t)} onClick={() => setTab(t)}>
                  {t.charAt(0).toUpperCase() + t.slice(1)}
                </button>
              ))}
            </div>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              {token
                ? <button style={s.btnGhost} onClick={logout}>Lock</button>
                : <button style={s.btn()} onClick={() => setShowLogin(true)}>Unlock admin</button>
              }
            </div>
          </nav>

          <div style={s.main}>
            {actionMsg && (
              <div style={{ background:'var(--blue-bg)', color:'var(--blue)', padding:'8px 14px', borderRadius:'var(--radius)', marginBottom:12, fontSize:13 }}>
                {actionMsg}
              </div>
            )}

            {tab === 'dashboard' && (
              <div>
                <div style={s.metrics}>
                  <div style={s.metric}><div style={s.metricLabel}>Trends scanned</div><div style={s.metricValue}>{st.trends_scanned||0}</div></div>
                  <div style={s.metric}><div style={s.metricLabel}>Concepts</div><div style={s.metricValue}>{st.concepts_generated||0}</div><div style={s.metricSub}>{st.concepts_approved||0} approved</div></div>
                  <div style={s.metric}><div style={s.metricLabel}>Deployed</div><div style={s.metricValue}>{st.tokens_deployed||0}</div></div>
                  <div style={s.metric}><div style={s.metricLabel}>Promotions</div><div style={s.metricValue}>{st.promotions_posted||0}</div></div>
                  <div style={s.metric}><div style={s.metricLabel}>Buybacks</div><div style={s.metricValue}>{st.buybacks_executed||0}</div></div>
                  <div style={s.metric}><div style={s.metricLabel}>Tokens burned</div><div style={s.metricValue}>{(st.tokens_burned||0).toLocaleString()}</div></div>
                </div>

                <div style={{ marginBottom:12 }}>
                  <div style={{...s.cardTitle, marginBottom:8}}>Pipeline status</div>
                  <div style={s.pipeline}>
                    {pipelineSteps.map((step, i) => (
                      <div key={i} style={{...s.step(step.done ? 'done' : i===firstPending ? 'active' : 'idle'), borderRadius: i===0 ? '8px 0 0 8px' : i===pipelineSteps.length-1 ? '0 8px 8px 0' : 0 }}>
                        <div style={{ fontSize:10, opacity:0.7 }}>{i+1}</div>
                        {step.label}
                      </div>
                    ))}
                  </div>
                </div>

                <div style={s.actions}>
                  <button style={s.btn()} onClick={() => runAction('/api/actions/scan', 'scanner')}>Run scanner</button>
                  <button style={s.btn()} onClick={() => runAction('/api/actions/generate', 'generator')}>Generate concepts</button>
                  <button style={s.btn()} onClick={() => runAction('/api/actions/deploy', 'deployer')}>Deploy</button>
                  <button style={s.btn()} onClick={() => runAction('/api/actions/promote', 'promoter')}>Promote</button>
                  <button style={s.btn()} onClick={() => runAction('/api/actions/buyback', 'buyback')}>Run buyback</button>
                  <button style={s.btn('green')} onClick={() => runAction('/api/actions/treasury', 'treasury')}>Treasury report</button>
                </div>

                <div style={s.grid}>
                  <div style={s.card}>
                    <div style={s.cardTitle}>Active coins</div>
                    {coinList.length === 0 && <div style={{ color:'var(--text3)', fontSize:13 }}>No coins deployed yet</div>}
                    {coinList.map((coin, i) => (
                      <div key={i} style={i===coinList.length-1 ? s.rowLast : s.row}>
                        <div>
                          <div style={{ fontWeight:500 }}>{coin.coin_name} <span style={{ color:'var(--text3)', fontWeight:400 }}>${coin.ticker}</span></div>
                          <div style={{ fontSize:12, color:'var(--text2)' }}>{coin.network}</div>
                        </div>
                        <Badge color="green">live</Badge>
                      </div>
                    ))}
                  </div>

                  <div style={s.card}>
                    <div style={s.cardTitle}>Recent activity</div>
                    {activityList.slice(0,4).map((e, i) => (
                      <div key={i} style={i===3 ? s.rowLast : s.row}>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:13, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{e.message}</div>
                          <div style={{ fontSize:11, color:'var(--text3)' }}>{e.tag}</div>
                        </div>
                        <div style={{ fontSize:11, color:'var(--text3)', marginLeft:8, whiteSpace:'nowrap' }}>{e.ts?.slice(0,10)}</div>
                      </div>
                    ))}
                    {activityList.length === 0 && <div style={{ color:'var(--text3)', fontSize:13 }}>No activity yet</div>}
                  </div>
                </div>
              </div>
            )}

            {tab === 'coins' && (
              <div style={s.card}>
                <div style={s.cardTitle}>All deployed coins</div>
                {coinList.length === 0 && <div style={{ color:'var(--text3)', fontSize:13 }}>No coins deployed yet. Run the deployer to get started.</div>}
                {coinList.map((coin, i) => (
                  <div key={i} style={{ padding:'12px 0', borderBottom: i<coinList.length-1 ? '0.5px solid var(--border)' : 'none' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                      <div style={{ fontWeight:500, fontSize:15 }}>{coin.coin_name} <span style={{ color:'var(--text3)', fontWeight:400 }}>${coin.ticker}</span></div>
                      <Badge color="green">live</Badge>
                    </div>
                    <div style={{ fontSize:12, color:'var(--text2)', display:'grid', gridTemplateColumns:'1fr 1fr', gap:4 }}>
                      <div>Mint: <span style={{ color:'var(--text3)', fontFamily:'monospace' }}>{coin.mint_address?.slice(0,20)}...</span></div>
                      <div>Network: {coin.network}</div>
                      <div>Supply: {(coin.total_supply||0).toLocaleString()}</div>
                      <div>Deployed: {coin.deployed_at?.slice(0,10)}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {tab === 'trends' && (
              <div>
                <div style={{ ...s.actions, marginBottom:16 }}>
                  <button style={s.btn()} onClick={() => runAction('/api/actions/scan', 'scanner')}>Run scanner now</button>
                  <button style={s.btn()} onClick={() => runAction('/api/actions/generate', 'generator')}>Generate concepts</button>
                </div>
                <div style={{ ...s.grid, marginBottom:16 }}>
                  <div style={s.card}>
                    <div style={s.cardTitle}>Top trends</div>
                    {trendList.length === 0 && <div style={{ color:'var(--text3)', fontSize:13 }}>No trends yet. Run the scanner.</div>}
                    {trendList.slice(0,8).map((t, i) => (
                      <div key={i} style={i===trendList.length-1 ? s.rowLast : s.row}>
                        <div style={{ display:'flex', alignItems:'center', gap:10, flex:1, minWidth:0 }}>
                          <div style={{ width:36, height:36, borderRadius:'var(--radius)', background:'var(--bg3)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:500, flexShrink:0 }}>{Math.round(t.viability_score||0)}</div>
                          <div style={{ minWidth:0 }}>
                            <div style={{ fontSize:13, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{t.title}</div>
                            <div style={{ fontSize:11, color:'var(--text3)' }}>{t.source} — {t.discovered_at?.slice(0,10)}</div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={s.card}>
                    <div style={s.cardTitle}>Pending concepts</div>
                    {conceptList.filter(c=>c.approved===0).length === 0 && <div style={{ color:'var(--text3)', fontSize:13 }}>No pending concepts.</div>}
                    {conceptList.filter(c=>c.approved===0).map((c, i, arr) => (
                      <div key={i} style={{ padding:'10px 0', borderBottom: i<arr.length-1 ? '0.5px solid var(--border)' : 'none' }}>
                        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                          <div style={{ fontWeight:500 }}>{c.coin_name} <span style={{ color:'var(--text3)', fontWeight:400 }}>${c.ticker}</span></div>
                          <Badge color="amber">pending</Badge>
                        </div>
                        <div style={{ fontSize:12, color:'var(--text2)', marginBottom:6 }}>{c.tagline}</div>
                        <div style={{ display:'flex', gap:6 }}>
                          <button style={{...s.btn('green'), fontSize:12, padding:'4px 10px'}} onClick={() => runAction(`/api/actions/approve/${c.id}`, 'approval')}>Approve</button>
                          <button style={{...s.btn('red'), fontSize:12, padding:'4px 10px'}} onClick={() => runAction(`/api/actions/reject/${c.id}`, 'rejection')}>Reject</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {tab === 'treasury' && (
              <div>
                <div style={s.actions}>
                  <button style={s.btn('green')} onClick={() => runAction('/api/actions/treasury', 'treasury')}>Refresh treasury</button>
                  <button style={s.btn()} onClick={() => runAction('/api/actions/buyback', 'buyback')}>Run buyback</button>
                </div>
                <div style={s.card}>
                  <div style={s.cardTitle}>Buyback history</div>
                  {buybackList.length === 0 && <div style={{ color:'var(--text3)', fontSize:13 }}>No buybacks executed yet.</div>}
                  {buybackList.map((b, i) => (
                    <div key={i} style={{ padding:'10px 0', borderBottom: i<buybackList.length-1 ? '0.5px solid var(--border)' : 'none' }}>
                      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                        <div style={{ fontWeight:500 }}>${b.ticker} buyback</div>
                        <Badge color="green">{b.status}</Badge>
                      </div>
                      <div style={{ fontSize:12, color:'var(--text2)', display:'grid', gridTemplateColumns:'1fr 1fr', gap:4 }}>
                        <div>Burned: {(b.tokens_burned||0).toLocaleString()}</div>
                        <div>Airdropped: {(b.tokens_airdropped||0).toLocaleString()}</div>
                        <div>Trigger: {b.trigger_balance} SOL</div>
                        <div>Date: {b.executed_at?.slice(0,10)}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {tab === 'logs' && (
              <div style={s.card}>
                <div style={s.cardTitle}>Activity log</div>
                {activityList.length === 0 && <div style={{ color:'var(--text3)', fontSize:13 }}>No activity yet.</div>}
                {activityList.map((e, i) => (
                  <div key={i} style={{ display:'flex', gap:12, padding:'8px 0', borderBottom: i<activityList.length-1 ? '0.5px solid var(--border)' : 'none', alignItems:'flex-start' }}>
                    <div style={{ fontSize:11, color:'var(--text3)', minWidth:80, marginTop:1 }}>{e.ts?.slice(0,16)?.replace('T',' ')}</div>
                    <div>
                      <div style={{ fontSize:13 }}>{e.message}</div>
                      <div style={{ fontSize:11, color:'var(--text3)' }}>{e.tag}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
